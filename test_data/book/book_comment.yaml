# 小说评论测试数据
# 对应 TestBookComment 测试类

test_cases:
  # 分页查询书籍评论列表测试用例
  list_comment_by_page:
    id: "TR_BOOK_010"
    title: "分页查询书籍评论列表接口测试"
    description: "测试分页查询书籍评论列表接口"
    request:
      method: "GET"
      endpoint: "/book/listCommentByPage"
      params:
        bookId: 1
        page: 1
        pageSize: 5
    expected:
      code: "00000"
      data_exists: true
      data_checks: []
    tags: ["book", "comment", "smoke"]
    auth_required: false
    
  # 分页查询评论回复列表测试用例
  list_comment_reply_by_page:
