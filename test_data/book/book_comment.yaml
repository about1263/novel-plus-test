        pageSize: 5
    expected:
      code: "00000"
      data_exists: true
      data_checks: []
    tags: ["book", "comment", "functional"]
    auth_required: false
    
  # 新增评价测试用例（需要认证）
  add_book_comment:
    id: "TR_BOOK_012"
    title: "新增评价接口测试"
    description: "测试新增评价接口"
    request:
      method: "POST"
      endpoint: "/book/addBookComment"
      data:
        bookId: 1
        commentContent: "这是一条测试评论"
        score: 5
    expected:
      code: "00000"
      data_exists: false
    tags: ["book", "comment", "functional", "auth"]
    auth_required: true
    
