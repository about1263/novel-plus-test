# 小说搜索测试数据
# 对应 TestBookSearch 测试类

test_cases:
  # 分页搜索测试用例
  search_by_page:
    id: "TR_BOOK_006"
    title: "分页搜索接口测试"
    description: "测试分页搜索接口"
    request:
      method: "GET"
      endpoint: "/book/searchByPage"
      params:
        keyword: "测试"
        page: 1
        pageSize: 20
    expected:
      code: "00000"
      data_exists: true
      data_checks: []
    tags: ["book", "search", "functional"]
  
  # 关键字搜索验证
  keyword_search_highlight:
    id: "TR_BOOK_007"
    title: "关键字搜索高亮显示验证"
    description: "验证输入小说名称关键字，是否返回匹配结果列表及高亮显示"
    request:
      method: "GET"
      endpoint: "/book/searchByPage"
      params:
        keyword: "测试小说"
        page: 1
        pageSize: 10
    expected:
      code: "00000"
      data_exists: true
      data_checks:
        - check_type: "list_not_empty"
          description: "搜索结果列表不应为空"
        - check_type: "keyword_in_results"
          keyword: "测试小说"
          field: "bookName"
          description: "结果中应包含关键字'测试小说'"
    tags: ["book", "search", "functional", "highlight"]
  
  # 分类筛选组合验证
  category_filter_combination:
    id: "TR_BOOK_008"
    title: "分类筛选组合验证"
    description: "验证选择玄幻分类+连载状态+30-50万字的条件，返回结果是否符合筛选逻辑"
    request:
      method: "GET"
      endpoint: "/book/searchByPage"
      params:
        catId: 1  # 玄幻分类ID，假设为1
        updateStatus: 1  # 连载状态，假设1表示连载
        wordCountMin: 30  # 最小字数（万字）
        wordCountMax: 50  # 最大字数（万字）
        page: 1
        pageSize: 10
    expected:
      code: "00000"
      data_exists: true
      data_checks:
        - check_type: "list_not_empty"
          description: "筛选结果列表不应为空"
        - check_type: "field_equals"
          field: "catId"
          value: 1
          description: "所有结果的分类ID应为1（玄幻）"
        - check_type: "field_equals"
          field: "bookStatus"
          value: 1  # 假设1表示连载状态
          description: "所有结果的小说状态应为连载"
        - check_type: "word_count_range"
          min: 30
          max: 50
          description: "所有结果的字数应在30-50万字之间"
    tags: ["book", "search", "filter", "functional"]
  
  # 排序功能验证
  sort_by_update_time:
    id: "TR_BOOK_009"
    title: "更新时间排序验证"
    description: "验证点击'更新时间'排序，结果是否按时间降序排列"
    request:
      method: "GET"
      endpoint: "/book/searchByPage"
      params:
        keyword: ""
        page: 1
        pageSize: 10
        orderBy: "lastIndexUpdateTime desc"  # 按更新时间降序排序
    expected:
      code: "00000"
      data_exists: true
      data_checks:
        - check_type: "list_not_empty"
          description: "排序结果列表不应为空"
        - check_type: "sorted_descending"
          field: "lastIndexUpdateTime"
          description: "结果应按更新时间降序排列"
    tags: ["book", "search", "sort", "functional"]
  
  # 无结果处理验证
  no_results_handling:
    id: "TR_BOOK_010"
    title: "无结果处理验证"
    description: "验证输入不存在的关键字，是否返回空列表及友好提示"
    request:
      method: "GET"
      endpoint: "/book/searchByPage"
      params:
        keyword: "不存在的测试关键字123456789"
        page: 1
        pageSize: 10
    expected:
      code: "00000"
      data_exists: true
      data_checks:
        - check_type: "list_empty_or_minimal"
          max_items: 0
          description: "搜索结果列表应为空或包含极少数目"
        - check_type: "response_message_contains"
          keywords: ["无结果", "未找到", "empty"]
          description: "响应消息应包含友好提示"
    tags: ["book", "search", "edge-case", "functional"]
  
  # 作者搜索验证
  author_search:
    id: "TR_BOOK_011"
    title: "作者搜索验证"
    description: "验证输入作者名称，是否正确返回该作者的所有作品列表"
    request:
      method: "GET"
      endpoint: "/book/searchByPage"
      params:
        authorName: "测试作者"  # 作者名称参数，假设为authorName
        page: 1
        pageSize: 10
    expected:
      code: "00000"
      data_exists: true
      data_checks:
        - check_type: "list_not_empty"
          description: "作者搜索结果列表不应为空"
        - check_type: "field_equals"
          field: "authorName"
          value: "测试作者"
          description: "所有结果的作者名称应为'测试作者'"
    tags: ["book", "search", "author", "functional"]