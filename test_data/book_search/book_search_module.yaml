# 小说搜索模块测试数据
# 对应 XSJS_API_01 到 XSJS_API_06 和 XSJS_API_10 测试用例

test_cases:
  # XSJS_API_01: 关键字搜索验证
  keyword_search_verification:
    id: "XSJS_API_01"
    title: "关键字搜索验证"
    description: "验证输入小说名称关键字，是否返回匹配结果列表及高亮显示"
    request:
      method: "GET"
      endpoint: "/book/searchByPage"
      params:
        keyword: "邻家"
        page: 1
        pageSize: 10
    expected:
      code: "200"
      data_exists: true
      data_checks:
        - check_type: "list_not_empty"
          description: "搜索结果列表不应为空"
        - check_type: "keyword_in_results"
          keyword: "邻家"
          field: "bookName"
          description: "结果中应包含关键字'邻家'"
    tags: ["book", "search", "functional", "keyword"]
    auth_required: false

  # XSJS_API_02: 分类筛选组合验证
  category_filter_combination:
    id: "XSJS_API_02"
    title: "分类筛选组合验证"
    description: "验证选择都市言情分类+连载状态+30万字以下的条件，返回结果是否符合筛选逻辑"
    request:
      method: "GET"
      endpoint: "/book/searchByPage"
      params:
        catId: 3  # 都市言情分类ID，根据实际数据为3
        bookStatus: 0  # 连载状态，根据实际数据0表示连载
        wordCountMin: 0  # 最小字数（万字）
        wordCountMax: 30  # 最大字数（万字）
        page: 1
        pageSize: 10
    expected:
      code: "200"
      data_exists: true
      data_checks:
        - check_type: "list_not_empty"
          description: "筛选结果列表不应为空"
        - check_type: "field_equals"
          field: "catId"
          value: "3"
          description: "所有结果的分类ID应为3（都市言情）"
        - check_type: "field_equals"
          field: "bookStatus"
          value: "0"  # 根据实际数据0表示连载状态
          description: "所有结果的小说状态应为连载"
        - check_type: "word_count_range"
          min: 0
          max: 30
          description: "所有结果的字数应在30万字以下"
    tags: ["book", "search", "filter", "functional"]
    auth_required: false

  # XSJS_API_03: 排序功能验证
  sort_function_verification:
    id: "XSJS_API_03"
    title: "排序功能验证"
    description: "验证点击'更新时间'排序，结果是否按时间降序排列"
    request:
      method: "GET"
      endpoint: "/book/searchByPage"
      params:
        keyword: ""
        page: 1
        pageSize: 10
        orderBy: "updateTime desc"  # 按更新时间降序排序
    expected:
      code: "200"
      data_exists: true
      data_checks:
        - check_type: "list_not_empty"
          description: "排序结果列表不应为空"
        - check_type: "sorted_descending"
          field: "lastIndexUpdateTime"
          description: "结果应按更新时间降序排列"
    tags: ["book", "search", "sort", "functional"]
    auth_required: false

  # XSJS_API_04: 无结果处理验证
  no_results_handling:
    id: "XSJS_API_04"
    title: "无结果处理验证"
    description: "验证输入不存在的关键字，是否返回空列表及友好提示"
    request:
      method: "GET"
      endpoint: "/book/searchByPage"
      params:
        keyword: "不存在的测试关键字123456789"
        page: 1
        pageSize: 10
    expected:
      code: "200"
      data_exists: true
      data_checks:
        - check_type: "list_empty_or_minimal"
          max_items: 0
          description: "搜索结果列表应为空或包含极少数目"
        - check_type: "response_message_contains"
          keywords: ["无结果", "未找到", "empty"]
          description: "响应消息应包含友好提示"
    tags: ["book", "search", "edge-case", "functional"]
    auth_required: false

  # XSJS_API_05: 分页功能验证
  pagination_function_verification:
    id: "XSJS_API_05"
    title: "分页功能验证"
    description: "验证分页功能，输入page=2, pageSize=20"
    request:
      method: "GET"
      endpoint: "/book/searchByPage"
      params:
        keyword: "测试"
        page: 2
        pageSize: 20
    expected:
      code: "200"
      data_exists: true
      data_checks:
        - check_type: "list_not_empty"
          description: "分页搜索结果列表不应为空"
    tags: ["book", "search", "pagination", "functional"]
    auth_required: false

  # XSJS_API_06: 作者搜索验证
  author_search_verification:
    id: "XSJS_API_06"
    title: "作者搜索验证"
    description: "验证输入作者名称，是否返回包含该作者的作品列表"
    request:
      method: "GET"
      endpoint: "/book/searchByPage"
      params:
        authorName: "lil_king"  # 作者名称参数
        page: 1
        pageSize: 10
    expected:
      code: "200"
      data_exists: true
      data_checks:
        - check_type: "list_not_empty"
          description: "作者搜索结果列表不应为空"
        - check_type: "keyword_in_results"
          keyword: "lil_king"
          field: "authorName"
          description: "结果中应包含作者'lil_king'的作品"
    tags: ["book", "search", "author", "functional"]
    auth_required: false

  # XSJS_API_10: 小说分类列表查询验证
  book_category_list_verification:
    id: "XSJS_API_10"
    title: "小说分类列表查询验证"
    description: "验证查询小说分类列表，是否返回正确的分类数据"
    request:
      method: "GET"
      endpoint: "/book/listBookCategory"
    expected:
      code: "200"
      data_exists: true
      data_checks:
        - check_type: "list_not_empty"
          description: "分类列表不应为空"
        - check_type: "field_exists"
          field: "id"
          description: "分类数据应包含id字段"
        - check_type: "field_exists"
          field: "name"
          description: "分类数据应包含name字段"
        - check_type: "keyword_in_results"
          keyword: "玄幻奇幻"
          field: "name"
          description: "分类列表中应包含'玄幻奇幻'分类"
    tags: ["book", "category", "functional"]
    auth_required: false