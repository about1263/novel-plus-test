  # 分页查询我的反馈列表接口测试
  list_user_feedback_by_page:
    id: "TR_USER_024"
    title: "分页查询我的反馈列表接口测试"
    description: "测试分页查询我的反馈列表接口"
    request:
      method: "GET"
      endpoint: "/user/listUserFeedBackByPage"
      params:
        page: 1
        pageSize: 5
    expected:
      code: "200"
      data_exists: true
      data_checks: []
    tags: ["user", "feedback", "auth", "smoke"]
    auth_required: true