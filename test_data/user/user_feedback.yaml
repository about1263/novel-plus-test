  add_feedback:
    id: "TR_USER_023"
    title: "添加反馈接口测试"
    description: "测试添加反馈接口"
    request:
      method: "POST"
      endpoint: "/user/addFeedBack"
      data:
        content: "这是一个测试反馈内容"
