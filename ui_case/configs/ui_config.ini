[browser]
# 浏览器类型: chrome 或 edge
browser_type = chrome
# 是否无头模式: true 或 false
headless = true
# 窗口大小: 宽度,高度
window_size = 1920,1080
# 隐式等待时间（秒）
implicit_wait = 10
# 页面加载超时时间（秒）
page_load_timeout = 30
# 驱动路径（留空则自动检测）
driver_path = 
# 下载目录（可选）
download_dir = 
# Chrome版本（可选，用于日志记录）
chrome_version = 146.0.7680.178
# Edge版本（可选，用于日志记录）
edge_version = 146.0.3856.97

[environment]
# 测试环境基础URL
base_url = http://47.108.213.8
# 登录页面路径
login_path = /user/login.html
# 首页路径
home_path = /index.html

[test]
# 默认测试用户名（手机号）
test_username = 18723968509
# 默认测试密码
test_password = zxcvbnm.
# 错误密码（用于测试）
wrong_password = wrongpass
# 错误手机号格式
invalid_phone = 1380013800
# 截图保存路径（相对路径）
screenshot_dir = ui_case/screenshots
# 报告保存路径
report_dir = ui_case/reports
# 是否在测试失败时自动截图
screenshot_on_failure = true
# 是否在测试结束时保存HTML快照
save_html_on_failure = false

[timeout]
# 元素查找超时（秒）
element_timeout = 10
# 页面跳转超时（秒）
page_navigation_timeout = 20
# 异步脚本超时（秒）
script_timeout = 10
# 弹窗等待超时（秒）
alert_timeout = 5

[logging]
# 日志级别: DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level = INFO
# 日志文件路径
log_file = ui_case/logs/ui_test.log
# 是否控制台输出
console_output = true
# 日志格式
log_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
# 日志文件最大字节数（默认10MB）
max_bytes = 10485760
# 备份文件数量
backup_count = 5

[report]
# 报告类型: allure, html, xml
report_type = allure
# 报告标题
report_title = Novel-Plus UI自动化测试报告
# 报告主题
report_theme = default
# 是否生成历史趋势
history_trend = true
# 是否附加截图到报告
attach_screenshot = true
# 是否附加日志到报告
attach_log = true

[cleanup]
# 是否启用自动清理
enabled = true
# 清理间隔（每N次运行清理一次）
interval = 5
# 保留最近多少个截图文件
keep_screenshots = 10
# 报告保留天数
keep_report_days = 3
# 日志文件最大大小（MB）
log_max_size_mb = 10
# 日志备份文件数量
log_backup_count = 3